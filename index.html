<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Playground - Live Editor</title>
    <link rel="stylesheet" href="style.css">
    <style id="live-styles"></style>
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <h1>CSS Grid Playground</h1>
        </div>
        <div class="controls">
            <div class="control-group">
                <label for="template-select">Presets:</label>
                <select id="template-select">
                    <option value="basic">Basic 3-Column</option>
                    <option value="holy-grail">Holy Grail Layout</option>
                    <option value="mosaic">Mosaic Layout</option>
                    <option value="twelve-column">12-Column System</option>
                    <option value="auto-fill">Responsive Auto-fill</option>
                </select>
            </div>
            <div class="control-group">
                <button id="add-item" class="btn btn-secondary" title="Add Item">+</button>
                <button id="remove-item" class="btn btn-secondary" title="Remove Item">-</button>
            </div>
            <button id="copy-css" class="btn btn-primary">Copy CSS</button>
        </div>
    </header>

    <main class="playground-main">
        <aside class="cheatsheet-sidebar">
            <h3>Grid Cheatsheet</h3>
            <div class="cheatsheet-items">
                <div class="cheat-item">
                    <code>display: grid;</code>
                    <button class="copy-small" data-copy="display: grid;">Copy</button>
                </div>
                <div class="cheat-item">
                    <code>grid-template-columns: 1fr 1fr;</code>
                    <button class="copy-small" data-copy="grid-template-columns: 1fr 1fr;">Copy</button>
                </div>
                <div class="cheat-item">
                    <code>gap: 10px;</code>
                    <button class="copy-small" data-copy="gap: 10px;">Copy</button>
                </div>
                <div class="cheat-item">
                    <code>grid-column: 1 / 3;</code>
                    <button class="copy-small" data-copy="grid-column: 1 / 3;">Copy</button>
                </div>
                <div class="cheat-item">
                    <code>align-items: center;</code>
                    <button class="copy-small" data-copy="align-items: center;">Copy</button>
                </div>
                <div class="cheat-item">
                    <code>justify-items: center;</code>
                    <button class="copy-small" data-copy="justify-items: center;">Copy</button>
                </div>
            </div>
        </aside>

        <section class="editor-pane">
            <div class="editor-group">
                <label>Container Properties (<code>.grid-container</code>)</label>
                <textarea id="container-css" spellcheck="false" placeholder="display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 1rem;"></textarea>
            </div>
            <div class="editor-group">
                <label>Item Properties (<code>.grid-item</code>)</label>
                <textarea id="item-css" spellcheck="false" placeholder="background: #bb86fc;
padding: 2rem;
border-radius: 8px;"></textarea>
            </div>
            <div id="error-display" class="error-message hidden">
                Invalid CSS syntax detected.
            </div>
        </section>

        <section class="preview-pane">
            <div id="grid-container" class="grid-container">
                <!-- Items generated by JS -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
